<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D Exhibition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; }

    /* Loading Screen */
    #loading-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff; transition: opacity 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-title { font-size: 2rem; font-weight: 300; letter-spacing: 0.3em; margin-bottom: 2rem; text-transform: uppercase; }
    #loading-bar-container { width: 300px; height: 2px; background: #333; border-radius: 1px; overflow: hidden; }
    #loading-bar { width: 0%; height: 100%; background: #fff; transition: width 0.3s ease; }
    #loading-status { margin-top: 1rem; font-size: 0.85rem; color: #888; letter-spacing: 0.1em; }

    /* Enter Prompt */
    #enter-prompt {
      display: none; margin-top: 2rem; padding: 0.8rem 2.5rem;
      background: transparent; border: 1px solid #555; color: #fff;
      font-size: 1rem; letter-spacing: 0.15em; cursor: pointer;
      transition: all 0.3s ease; text-transform: uppercase;
    }
    #enter-prompt:hover { background: #fff; color: #000; border-color: #fff; }
    #enter-prompt.visible { display: block; }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px; z-index: 10; pointer-events: none; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.5);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    #crosshair.visible { display: block; }

    /* HUD */
    #hud {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 0.75rem; letter-spacing: 0.1em;
      text-align: center; z-index: 10; pointer-events: none; display: none;
      transition: opacity 0.5s ease;
    }
    #hud.visible { display: block; }

    /* Artwork Info Panel */
    #artwork-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 380px;
      background: rgba(0,0,0,0.92); color: #fff; z-index: 20;
      padding: 3rem 2rem; transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto; backdrop-filter: blur(20px);
    }
    #artwork-panel.visible { transform: translateX(0); }
    #artwork-panel .close-btn {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer;
      transition: color 0.2s;
    }
    #artwork-panel .close-btn:hover { color: #fff; }
    #artwork-panel .art-title { font-size: 1.5rem; font-weight: 300; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    #artwork-panel .art-artist { font-size: 1rem; color: #aaa; margin-bottom: 0.3rem; }
    #artwork-panel .art-year { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; }
    #artwork-panel .art-divider { width: 40px; height: 1px; background: #444; margin-bottom: 1.5rem; }
    #artwork-panel .art-desc { font-size: 0.9rem; line-height: 1.7; color: #ccc; font-weight: 300; }
    #artwork-panel .art-category { font-size: 0.8rem; color: #999; margin-bottom: 0.8rem; }
    #artwork-panel .art-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.2rem; }
    #artwork-panel .art-tag { font-size: 0.75rem; color: #aaa; background: rgba(255,255,255,0.08); padding: 0.25rem 0.6rem; border-radius: 12px; }
    #artwork-panel .art-stats { font-size: 0.8rem; color: #666; margin-top: 1.2rem; }
    #artwork-panel .art-loading { font-size: 0.85rem; color: #666; }
    #artwork-panel .art-link {
      display: inline-block; margin-top: 1rem; padding: 0.5rem 0.9rem;
      font-size: 0.8rem; color: #ccc; text-decoration: none;
      border: 1px solid #3a3a3a; border-radius: 3px;
      transition: all 0.2s ease;
    }
    #artwork-panel .art-link:hover { border-color: #666; color: #fff; background: rgba(255,255,255,0.04); }
    #artwork-panel .art-body {
      font-size: 0.85rem; line-height: 1.7; color: #bbb; font-weight: 300;
      margin-top: 1.5rem; padding-top: 1.2rem; border-top: 1px solid #2a2a2a;
      word-break: break-word;
    }
    #artwork-panel .art-body p { margin: 0 0 0.8rem 0; }
    #artwork-panel .art-body strong { color: #e0e0e0; font-weight: 500; }
    #artwork-panel .art-body img { display: block; max-width: 100%; height: auto; margin: 0.8rem 0; border-radius: 3px; }
    #artwork-panel .art-body a { color: #8ab4f8; text-decoration: none; }
    #artwork-panel .art-body a:hover { text-decoration: underline; }

    /* Exhibition Picker */
    #exhibition-picker {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; align-items: center;
      background: #0a0a0a; color: #fff;
      padding: 4rem 2rem; overflow-y: auto;
    }
    #exhibition-picker.hidden { display: none; }
    #picker-title {
      font-size: 1.2rem; font-weight: 300; letter-spacing: 0.3em;
      text-transform: uppercase; color: #888; margin-bottom: 2.5rem;
    }
    .picker-container { width: 100%; max-width: 800px; }
    .picker-section { margin-bottom: 3rem; }
    .picker-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid #222;
    }
    .picker-section-header h2 {
      font-size: 0.85rem; font-weight: 400; letter-spacing: 0.15em;
      text-transform: uppercase; color: #aaa;
    }
    .picker-btn {
      font-size: 0.75rem; color: #ccc; background: transparent;
      border: 1px solid #3a3a3a; padding: 0.4rem 0.9rem; cursor: pointer;
      text-decoration: none; letter-spacing: 0.05em; border-radius: 3px;
      transition: all 0.2s ease;
    }
    .picker-btn:hover { border-color: #666; color: #fff; background: rgba(255,255,255,0.04); }
    .picker-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .picker-empty { font-size: 0.8rem; color: #555; padding: 1rem; text-align: center; border: 1px dashed #222; border-radius: 3px; }
    /* Template tabs */
    .template-tabs {
      display: flex; align-items: center; gap: 0; margin-bottom: 1rem;
      border-bottom: 1px solid #222;
    }
    .template-tab {
      padding: 0.6rem 1.2rem; font-size: 0.8rem; color: #777;
      background: transparent; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.05em;
    }
    .template-tab:hover { color: #ccc; }
    .template-tab.active { color: #fff; border-bottom-color: #fff; }
    .template-tab .tab-count {
      font-size: 0.65rem; color: #555; margin-left: 0.3rem;
    }
    .template-tab.active .tab-count { color: #888; }
    .template-tabs .tab-spacer { flex: 1; }
    /* Template grid layout */
    .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1rem; }
    .template-pagination {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      margin-top: 1.2rem;
    }
    .template-pagination button {
      min-width: 32px; height: 32px; padding: 0 0.6rem;
      background: transparent; border: 1px solid #2e2e2e; border-radius: 3px;
      color: #888; font-size: 0.75rem; cursor: pointer; transition: all 0.2s ease;
    }
    .template-pagination button:hover { border-color: #555; color: #fff; }
    .template-pagination button.active { border-color: #888; color: #fff; background: rgba(255,255,255,0.08); }
    .template-pagination button:disabled { opacity: 0.3; cursor: default; }
    .template-pagination button:disabled:hover { border-color: #2e2e2e; color: #888; }
    .template-card {
      display: flex; flex-direction: column;
      background: #141414; border: 1px solid #242424; border-radius: 4px;
      cursor: pointer; transition: all 0.25s ease; overflow: hidden;
    }
    .template-card:hover { border-color: #555; background: #181818; transform: translateY(-2px); }
    .template-card .template-preview {
      width: 100%; height: 140px; display: block; background: #0c0c0c;
    }
    .template-card .card-body { padding: 0.9rem 1rem; }
    .template-card h3 { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.3rem; color: #eee; }
    .template-card p { font-size: 0.7rem; color: #777; line-height: 1.4; margin-bottom: 0.3rem; }
    .template-card .card-meta { font-size: 0.65rem; color: #555; }
    /* Exhibition list cards (내 전시회) */
    .exhibition-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.4rem;
      background: #141414; border: 1px solid #242424; border-radius: 3px;
      transition: all 0.25s ease;
    }
    .exhibition-card:hover { border-color: #444; background: #181818; }
    .exhibition-card .card-main { flex: 1; min-width: 0; cursor: pointer; }
    .exhibition-card h3 {
      font-weight: 400; font-size: 1rem; margin-bottom: 0.25rem; color: #eee;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .exhibition-card p {
      font-size: 0.75rem; color: #777;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .exhibition-card .card-meta { font-size: 0.7rem; color: #555; margin-top: 0.3rem; }
    .exhibition-card .card-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .exhibition-card .card-btn {
      font-size: 0.7rem; color: #999; background: transparent;
      border: 1px solid #2e2e2e; padding: 0.35rem 0.7rem; cursor: pointer;
      transition: all 0.2s ease; text-decoration: none; white-space: nowrap;
    }
    .exhibition-card .card-btn:hover { border-color: #555; color: #fff; }
    .exhibition-card .card-btn.danger:hover { border-color: #a44; color: #ff8a8a; }

    @media (max-width: 768px) {
      #artwork-panel { width: 100%; }
      #loading-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="loading-screen">
    <div id="loading-title">EXHIBITION</div>
    <div id="loading-bar-container"><div id="loading-bar"></div></div>
    <div id="loading-status">준비 중...</div>
    <button id="enter-prompt">입장하기</button>
  </div>

  <div id="crosshair"></div>

  <div id="hud">WASD 이동 · 마우스 시선 · 클릭 작품 감상 · ESC 나가기</div>

  <div id="artwork-panel">
    <button class="close-btn">&times;</button>
    <h2 class="art-title"></h2>
    <p class="art-artist"></p>
    <p class="art-category"></p>
    <p class="art-year"></p>
    <div class="art-divider"></div>
    <p class="art-desc"></p>
    <div class="art-tags"></div>
    <p class="art-stats"></p>
    <a class="art-link" target="_blank" rel="noopener noreferrer">Grafolio에서 보기 →</a>
    <div class="art-body"></div>
    <p class="art-loading"></p>
  </div>

  <div id="exhibition-picker" class="hidden">
    <div id="picker-title">전시 선택</div>
    <div class="picker-container">
      <div class="picker-section">
        <div class="template-tabs">
          <button class="template-tab active" id="tab-builtin">기본 템플릿</button>
          <button class="template-tab" id="tab-custom">내 템플릿 <span class="tab-count" id="tab-custom-count"></span></button>
          <span class="tab-spacer"></span>
          <a class="picker-btn" href="/editor/">새 템플릿 만들기</a>
        </div>
        <div id="picker-templates" class="picker-list"></div>
      </div>
      <div class="picker-section">
        <div class="picker-section-header">
          <h2>내 전시회</h2>
          <a class="picker-btn" href="/editor/">새 전시회 만들기</a>
        </div>
        <div id="picker-custom" class="picker-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
