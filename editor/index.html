<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Map Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1.5rem; background: #111; border-bottom: 1px solid #222; }
    .header h1 { font-size: 1rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: #888; }
    .header-actions { display: flex; gap: 0.6rem; }
    .btn { padding: 0.5rem 1.2rem; border: 1px solid #444; background: transparent; color: #ccc; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
    .btn:hover { background: #fff; color: #000; border-color: #fff; }
    .btn.primary { background: #fff; color: #000; border-color: #fff; }
    .btn.primary:hover { background: #ccc; }

    /* Main layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Toolbar */
    .toolbar { width: 220px; background: #111; border-right: 1px solid #222; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .tool-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 0.6rem; }
    .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .tool-btn { padding: 0.6rem 0.5rem; border: 1px solid #2a2a2a; background: #1a1a1a; color: #aaa; font-size: 0.75rem; cursor: pointer; text-align: center; transition: all 0.2s; border-radius: 4px; }
    .tool-btn:hover { border-color: #555; color: #fff; }
    .tool-btn.active { border-color: #fff; color: #fff; background: #2a2a2a; }
    .tool-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 0.2rem; }

    /* Size controls */
    .size-row { display: flex; align-items: center; gap: 0.5rem; }
    .size-row label { font-size: 0.75rem; color: #888; min-width: 25px; }
    .size-row input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 0.4rem; font-size: 0.8rem; width: 60px; text-align: center; }

    /* Artwork ID input */
    .artwork-input { display: none; margin-top: 0.5rem; }
    .artwork-input.visible { display: block; }
    .artwork-input label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 0.3rem; }
    .artwork-input input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 0.4rem; font-size: 0.8rem; }
    .artwork-input select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 0.4rem; font-size: 0.8rem; margin-top: 0.3rem; }

    /* Content area (2D + 3D split) */
    .content { flex: 1; display: flex; overflow: hidden; }
    .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; background: #080808; position: relative; min-width: 0; }
    #grid-canvas { cursor: crosshair; image-rendering: pixelated; }

    /* 3D Preview panel */
    .preview-panel { width: 45%; min-width: 300px; background: #0a0a0a; border-left: 1px solid #222; position: relative; display: flex; flex-direction: column; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 1rem; background: #111; border-bottom: 1px solid #222; }
    .preview-header span { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.1em; }
    .preview-header .preview-status { font-size: 0.7rem; color: #4eff7e; }
    #preview-canvas { flex: 1; width: 100%; display: block; }
    .preview-overlay { position: absolute; inset: 0; top: 32px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 0.85rem; pointer-events: none; }

    /* Status */
    .status { padding: 0.4rem 1.5rem; background: #111; border-top: 1px solid #222; font-size: 0.75rem; color: #666; display: flex; justify-content: space-between; }

    /* Current map indicator */
    .current-map { font-size: 0.75rem; color: #888; padding: 0.3rem 0.8rem; border: 1px solid #222; border-radius: 3px; }
    .current-map strong { color: #ccc; font-weight: 500; }

    /* Editor mode toggle */
    .mode-toggle { display: flex; align-items: center; gap: 0.4rem; }
    .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .mode-dot.map { background: #4eff7e; }
    .mode-dot.exhibition { background: #4a9eff; }

    /* Exhibition mode: hide map-only UI via body class */
    body.mode-exhibition .tool-btn[data-mode="map"] { display: none; }
    body.mode-exhibition #section-map-size { display: none; }
    body.mode-exhibition #section-wall-height { display: none; }

    /* Modal */
    .modal { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal.visible { display: flex; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); }
    .modal-content { position: relative; width: 520px; max-width: 90vw; max-height: 80vh; background: #141414; border: 1px solid #2a2a2a; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.4rem; border-bottom: 1px solid #222; }
    .modal-header h2 { font-size: 0.9rem; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: #ccc; }
    .modal-close { background: none; border: none; color: #666; font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: #fff; }
    .modal-body { padding: 1rem 1.4rem; overflow-y: auto; }
    .map-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; background: #1a1a1a; border: 1px solid #252525; border-radius: 3px; margin-bottom: 0.5rem; }
    .map-item .map-main { flex: 1; min-width: 0; }
    .map-item h4 { font-size: 0.9rem; font-weight: 400; color: #e0e0e0; margin-bottom: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .map-item .map-meta { font-size: 0.7rem; color: #666; }
    .map-item .map-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .map-item .map-btn { font-size: 0.7rem; color: #aaa; background: transparent; border: 1px solid #333; padding: 0.35rem 0.7rem; cursor: pointer; transition: all 0.2s; }
    .map-item .map-btn:hover { border-color: #666; color: #fff; }
    .map-item .map-btn.danger:hover { border-color: #a44; color: #ff8a8a; }
    .modal-empty { text-align: center; color: #555; font-size: 0.85rem; padding: 2rem 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gallery Map Editor</h1>
    <div class="header-actions">
      <button class="btn mode-toggle" id="btn-mode-toggle">
        <span class="mode-dot map" id="mode-dot"></span>
        <span id="mode-label">맵 편집 모드</span>
      </button>
      <span class="current-map" id="current-map-label">새 전시회</span>
      <button class="btn" id="btn-new">새로 만들기</button>
      <button class="btn" id="btn-my-maps">내 전시회</button>
      <button class="btn" id="btn-save">저장</button>
      <button class="btn" id="btn-export">JSON 내보내기</button>
      <button class="btn primary" id="btn-preview">3D 미리보기</button>
    </div>
  </div>

  <div class="modal" id="maps-modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>내 전시회</h2>
        <button class="modal-close" id="maps-modal-close">&times;</button>
      </div>
      <div class="modal-body" id="maps-modal-body"></div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="tool-section">
        <h3>도구</h3>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="floor" data-mode="map"><span class="icon">⬜</span>바닥</button>
          <button class="tool-btn" data-tool="wall" data-mode="map"><span class="icon">⬛</span>벽</button>
          <button class="tool-btn" data-tool="door" data-mode="map"><span class="icon">🚪</span>문</button>
          <button class="tool-btn" data-tool="artwork"><span class="icon">🖼</span>작품</button>
          <button class="tool-btn" data-tool="spawn"><span class="icon">📍</span>시작점</button>
          <button class="tool-btn" data-tool="empty" data-mode="map"><span class="icon">✕</span>지우기</button>
        </div>
      </div>

      <div class="tool-section">
        <h3>무드보드</h3>
        <div style="display:flex;gap:0.3rem">
          <input type="text" id="moodboard-id" placeholder="무드보드 ID" style="flex:1;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.4rem;font-size:0.75rem;" />
          <button class="btn" id="btn-load-moodboard" style="padding:0.4rem 0.6rem;font-size:0.7rem;">불러오기</button>
        </div>
        <div id="moodboard-status" style="font-size:0.7rem;color:#666;margin-top:0.3rem;"></div>
      </div>

      <div class="artwork-input" id="artwork-options">
        <label>작품 선택</label>
        <select id="artwork-select">
          <option value="">무드보드를 먼저 불러오세요</option>
        </select>
        <label style="margin-top:0.4rem">또는 직접 입력</label>
        <input type="text" id="artwork-id" placeholder="작품 ID 직접 입력" />
        <label style="margin-top:0.4rem">방향</label>
        <select id="artwork-facing">
          <option value="auto">자동 감지</option>
          <option value="north">북 (위)</option>
          <option value="south">남 (아래)</option>
          <option value="east">동 (오른쪽)</option>
          <option value="west">서 (왼쪽)</option>
        </select>
      </div>

      <div class="tool-section" id="section-map-size">
        <h3>맵 크기</h3>
        <div class="size-row">
          <label>W</label>
          <input type="number" id="map-width" value="20" min="5" max="50" />
          <label>H</label>
          <input type="number" id="map-height" value="15" min="5" max="50" />
        </div>
        <button class="btn" id="btn-resize" style="margin-top:0.5rem;width:100%">크기 변경</button>
      </div>

      <div class="tool-section" id="section-wall-height">
        <h3>벽 높이 (m)</h3>
        <input type="number" id="wall-height" value="4" min="2" max="8" step="0.5" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.4rem;font-size:0.8rem;" />
      </div>

      <div class="tool-section">
        <h3>텍스처</h3>
        <div style="display:flex;flex-direction:column;gap:0.5rem">
          <div>
            <label style="font-size:0.7rem;color:#888;display:block;margin-bottom:0.2rem">바닥</label>
            <select id="tex-floor" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.3rem;font-size:0.75rem;">
              <option value="">기본 색상</option>
              <option value="wood-light">밝은 나무 마루</option>
              <option value="wood-dark">어두운 나무 마루</option>
              <option value="marble">대리석</option>
              <option value="concrete">콘크리트</option>
              <option value="custom">직접 입력</option>
            </select>
            <input type="text" id="tex-floor-url" placeholder="이미지 URL" style="display:none;width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.3rem;font-size:0.75rem;margin-top:0.2rem;" />
          </div>
          <div>
            <label style="font-size:0.7rem;color:#888;display:block;margin-bottom:0.2rem">벽</label>
            <select id="tex-wall" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.3rem;font-size:0.75rem;">
              <option value="">기본 색상</option>
              <option value="plaster">흰 플라스터</option>
              <option value="brick">벽돌</option>
              <option value="concrete">콘크리트</option>
              <option value="custom">직접 입력</option>
            </select>
            <input type="text" id="tex-wall-url" placeholder="이미지 URL" style="display:none;width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.3rem;font-size:0.75rem;margin-top:0.2rem;" />
          </div>
          <div>
            <label style="font-size:0.7rem;color:#888;display:block;margin-bottom:0.2rem">천장</label>
            <select id="tex-ceiling" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.3rem;font-size:0.75rem;">
              <option value="">기본 색상</option>
              <option value="white-tile">흰 타일</option>
              <option value="plaster">플라스터</option>
              <option value="custom">직접 입력</option>
            </select>
            <input type="text" id="tex-ceiling-url" placeholder="이미지 URL" style="display:none;width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:0.3rem;font-size:0.75rem;margin-top:0.2rem;" />
          </div>
        </div>
      </div>

      <div class="tool-section" style="margin-top:auto">
        <h3>범례</h3>
        <div style="font-size:0.7rem;color:#888;line-height:1.8">
          <div><span style="color:#e0d5c0">■</span> 바닥 — 걸을 수 있는 영역</div>
          <div><span style="color:#555">■</span> 벽 — 막힌 영역</div>
          <div><span style="color:#8B6914">■</span> 문 — 통과 가능</div>
          <div><span style="color:#4a9eff">■</span> 작품 위치</div>
          <div><span style="color:#4eff7e">■</span> 시작 위치</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="canvas-area">
        <canvas id="grid-canvas"></canvas>
      </div>
      <div class="preview-panel">
        <div class="preview-header">
          <span>3D 미리보기</span>
          <span class="preview-status" id="preview-status">대기 중</span>
        </div>
        <canvas id="preview-canvas"></canvas>
        <div class="preview-overlay" id="preview-overlay">바닥 타일을 배치하면 미리보기가 시작됩니다</div>
      </div>
    </div>
  </div>

  <div class="status">
    <span id="status-pos">0, 0</span>
    <span id="status-info">클릭/드래그로 타일 배치</span>
  </div>

  <script type="module" src="/src/editor.ts"></script>
</body>
</html>
